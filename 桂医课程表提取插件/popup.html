<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>课程表提取器</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { width: 320px; padding: 20px; font-family: system-ui, 'Segoe UI', Roboto; background: #f9fafb; color: #1f2937; }
      h2 { font-size: 1.25rem; font-weight: 600; margin-bottom: 1rem; text-align: center; display: flex; align-items: center; justify-content: center; gap: 0.5rem; }
      .form-group { margin-bottom: 1rem; }
      label { display: block; font-size: 0.85rem; font-weight: 500; margin-bottom: 0.25rem; }
      input, select { width: 100%; padding: 8px 12px; border: 1px solid #d1d5db; border-radius: 10px; font-size: 0.9rem; background: white; }
      button { width: 100%; background: #3b82f6; color: white; border: none; border-radius: 30px; padding: 10px 0; font-weight: 600; cursor: pointer; margin-top: 8px; }
      button:hover { background: #2563eb; }
      .status { margin-top: 14px; padding: 8px 10px; border-radius: 12px; font-size: 0.8rem; text-align: center; background: #f3f4f6; }
      .status.error { background: #fee2e2; color: #b91c1c; }
      .status.success { background: #dcfce7; color: #166534; }
      .footer { font-size: 0.65rem; text-align: center; color: #9ca3af; margin-top: 12px; }
    </style>
  </head>
  <body>
    <h2>📅 课表提取器</h2>
    <div class="form-group">
      <label>📆 学年 (开始年份)</label>
      <input type="number" id="yearInput" value="2024" min="2000" max="2100" step="1" />
      <div class="hint">例如：2024 代表 2024-2025学年</div>
    </div>
    <div class="form-group">
      <label>📚 学期</label>
      <select id="termSelect">
        <option value="1">上学期 (1)</option>
        <option value="2">下学期 (2)</option>
        <option value="3">短学期 (3)</option>
      </select>
      <div class="hint">1=上学期, 2=下学期, 3=短学期</div>
    </div>
    <button id="extractBtn">✨ 提取并导出课表 JSON</button>
    <div id="statusMsg" class="status">⚡ 请确保已登录教务系统，并停留在课表页面</div>
    <div class="footer">💡 基于教务系统 /jwglxt 接口 · 数据仅保存在本地</div>
    <script src="provider.js"></script>
    <script src="timer.js"></script>
    <script src="parser.js"></script>
    <script src="convert.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
